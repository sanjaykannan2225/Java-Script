<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .form-box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h2>Register Form</h2>

    <form onsubmit="return validateForm()">

        <input type="text" id="name" placeholder="Enter Name"><br>
        <span id="nameError" class="error"></span><br>

        <input type="text" id="email" placeholder="Enter Email"><br>
        <span id="emailError" class="error"></span><br>

        <button type="submit">Submit</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
