<!DOCTYPE html>
<html>
<head>
<title>Mouse Events</title>
<script src="script.js"></script>

<style>
body{
    background-color: darkgrey;
    font-family: Arial, sans-serif;
    text-align: center;
}

h2{
    color: #333;
}

button{
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    background-color: #e0e0e0; /* light gray */
    color: #333;
    cursor: pointer;
    font-size: 15px;
}

button:hover{
    background-color: #cfcfcf;
}

#result{
    margin-top: 15px;
    font-size: 18px;
    color: #444;
    font-weight: bold;
}
</style>

</head>

<body>
<center>
<h2>Mouse Event Handling</h2>

<button onclick="clickEvent()">Click</button><br><br>

<button ondblclick="doubleClickEvent()">Double Click</button><br><br>

<button onmousedown="mouseDownEvent()">Mouse Down</button><br><br>

<button onmouseover="mouseOverEvent()">Mouse Over</button><br><br>

<button onmouseenter="mouseEnterEvent()">Mouse Enter</button><br><br>

<p id="result"></p>
</center>
</body>
</html>
