<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Projects</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            text-align: center;
        }

        /* Header */
        header {
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Container */
        .container {
            margin-top: 40px;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;
            background: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #007bff;
            color: white;
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            margin-top: 50px;
            background: #222;
            color: white;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    JavaScript Sample Codes
</header>

<div class="container">

    <button class="btn" onclick="location.href='Branching/branching.html'">Branching</button>

    <button class="btn" onclick="location.href='Calculator/calculator.html'">Calculator</button>

    <button class="btn" onclick="location.href='ClickME Date and time/date.html'">Date & Time</button>

    <button class="btn" onclick="location.href='Event Handling/event.html'">Event Handling</button>

    <button class="btn" onclick="location.href='form validation/form.html'">Form Validation</button>

    <button class="btn" onclick="location.href='inner HTML/inner.html'">Inner HTML</button>

    <button class="btn" onclick="location.href='Table/table.html'">Table</button>

    <button class="btn" onclick="location.href='variable/variable.html'">Variable</button>

</div>

<footer>
    Created by Sanjay | Course: JavaScript
</footer>

</body>
</html>
